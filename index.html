<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AuraHabit - Offline Premium Tracker</title>
    
    <!-- PWA configuration links -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    
    <!-- iOS native styling configurations -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AuraHabit" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/calendar--v1.png" />

    <style>
      /* Smooth touch tap highlights for iOS webapps */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      /* Prevent scrolling elastic bounds on web view panels default overflow */
      html, body {
        overscroll-behavior-y: contain;
      }
    </style>
  </head>
  <body class="bg-slate-50 dark:bg-gray-950 font-sans antialiased text-gray-900 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service worker register callback
      if ('serviceWorker' in navigator && !window.location.host.includes('localhost') && !window.location.host.includes('.run.app')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            console.log('AuraHabit Service Worker registered with scope: ', reg.scope);
          }).catch((err) => {
            console.warn('AuraHabit Service Worker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
